<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Finanzas — Iniciar sesión</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="min-h-screen bg-gradient-to-br from-slate-900 via-slate-800 to-emerald-950 flex items-center justify-center p-4">

  <div class="w-full max-w-md">

    <!-- Marca -->
    <div class="text-center mb-8">
      <div class="inline-flex items-center justify-center w-16 h-16 rounded-2xl bg-emerald-500 shadow-lg shadow-emerald-500/30 mb-4">
        <svg class="w-8 h-8 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
            d="M12 8c-1.657 0-3 .895-3 2s1.343 2 3 2 3 .895 3 2-1.343 2-3 2m0-8c1.11 0 2.08.402 2.599 1M12 8V7m0 1v8m0 0v1m0-1c-1.11 0-2.08-.402-2.599-1M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/>
        </svg>
      </div>
      <h1 class="text-2xl font-bold text-white tracking-tight">Finanzas Personales</h1>
      <p class="text-slate-400 mt-1 text-sm">Inicia sesión para continuar</p>
    </div>

    <!-- Tarjeta de login -->
    <div class="bg-white/5 backdrop-blur-sm border border-white/10 rounded-2xl p-8 shadow-2xl">
      <form id="form">
        <div class="space-y-5">

          <div>
            <label class="block text-sm font-medium text-slate-300 mb-2">Correo electrónico</label>
            <input id="correo" type="email" required autocomplete="email"
              placeholder="tu@correo.com"
              class="w-full px-4 py-3 bg-slate-800/60 border border-slate-700 rounded-xl text-white placeholder-slate-500
                     focus:outline-none focus:ring-2 focus:ring-emerald-500 focus:border-transparent transition">
          </div>

          <div>
            <label class="block text-sm font-medium text-slate-300 mb-2">Contraseña</label>
            <input id="clave" type="password" required autocomplete="current-password"
              placeholder="••••••••"
              class="w-full px-4 py-3 bg-slate-800/60 border border-slate-700 rounded-xl text-white placeholder-slate-500
                     focus:outline-none focus:ring-2 focus:ring-emerald-500 focus:border-transparent transition">
          </div>

          <p id="error" class="text-red-400 text-sm hidden"></p>

          <button id="btn" type="submit"
            class="w-full py-3 px-6 bg-emerald-500 hover:bg-emerald-400 active:scale-95 text-white font-semibold
                   rounded-xl transition-all shadow-lg shadow-emerald-500/20">
            Iniciar sesión
          </button>

        </div>
      </form>
    </div>

  </div>

  <script>
    // Redirigir si ya hay sesión activa
    if (localStorage.getItem('finanzas_token')) window.location.href = '/app.html';

    document.getElementById('form').addEventListener('submit', async function(e) {
      e.preventDefault();
      const btn    = document.getElementById('btn');
      const errorEl = document.getElementById('error');
      btn.textContent = 'Entrando…';
      btn.disabled = true;
      errorEl.classList.add('hidden');

      try {
        const r = await fetch('/api/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            correo:     document.getElementById('correo').value,
            contrasena: document.getElementById('clave').value
          })
        });
        const data = await r.json();
        if (!r.ok) {
          errorEl.textContent = data.error || 'Error al iniciar sesión';
          errorEl.classList.remove('hidden');
          btn.textContent = 'Iniciar sesión';
          btn.disabled = false;
          return;
        }
        localStorage.setItem('finanzas_token',  data.token);
        localStorage.setItem('finanzas_nombre', data.nombre);
        window.location.href = '/app.html';
      } catch {
        errorEl.textContent = 'No se pudo conectar al servidor';
        errorEl.classList.remove('hidden');
        btn.textContent = 'Iniciar sesión';
        btn.disabled = false;
      }
    });
  </script>
</body>
</html>
